          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/camera/capture:
    post:
      tags:
        - Camera
      summary: Start a capture
      description: This endpoint starts a capture. The capture will be cached on the disk and can be retrieved using its id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureConfig"
      responses:
        "200":
          description: Capture started
          content:
            application/json:
              schema:
                type: object
                properties:
                  CaptureId:
                    type: string
                    format: guid
                    example: b8ff14c8-6ccd-4433-b093-d14b844a41c6
                  FinalizeCaptureProcessId:
                    type: string
                    format: guid
                    example: 4dcefaca-f9d9-4e13-b2e5-6cfb6dc517f3
        "409":
          description: Process conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProcessStart409"
                  - $ref: "#/components/schemas/Error"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/camera/capture/{id}:
    get:
      tags:
        - Camera
      summary: Get capture
      description: This endpoint returns the capture with the specified id. When resizing the image, you don't need to specify width and height, if you only specify one, it will scale the image to preserve the aspect ratio
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: guid
            example: b8ff14c8-6ccd-4433-b093-d14b844a41c6
        - $ref: "#/components/parameters/ImageWidth"
        - $ref: "#/components/parameters/ImageHeight"
        - $ref: "#/components/parameters/ImageScale"
        - $ref: "#/components/parameters/ImageQuality"
        - $ref: "#/components/parameters/ImageFormat"
        - $ref: "#/components/parameters/ImageStretchEnabled"
        - $ref: "#/components/parameters/ImageStretchFactor"
        - $ref: "#/components/parameters/ImageDebayerEnabled"
        - $ref: "#/components/parameters/BayerPattern"
        - $ref: "#/components/parameters/ImageUnlinkedStretchEnabled"
        - $ref: "#/components/parameters/ImageBlackClipping"
        - $ref: "#/components/parameters/RawConverter"
      responses:
        "200":
          description: Capture found
          content:
            image/jpeg:
              schema:
                description: Image in jpeg format
                type: string
                format: binary
            image/png:
              schema:
                description: Image in png format
                type: string
                format: binary
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Camera
      summary: Delete capture
      description: This endpoint deletes the capture with the specified id. Trying to retrieve the capture afterwards will result in a 404 error.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: guid
            example: b8ff14c8-6ccd-4433-b093-d14b844a41c6
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Capture removed
                required:
                  - Message
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/camera/capture/{id}/analysis:
    get:
      tags:
        - Camera
      summary: Analyze capture
      description: This endpoint analyzes the capture with the specified id. The result of the analysis is cached for future calls.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: guid
            example: b8ff14c8-6ccd-4433-b093-d14b844a41c6
        - in: query
          name: raw-converter
          required: false
          schema:
            $ref: "#/components/schemas/RawConverterEnum"
        - in: query
          name: star-sensitivity
          required: false
          schema:
            $ref: "#/components/schemas/StarSensitivityEnum"
        - in: query
          name: noise-reduction
          required: false
          schema:
            $ref: "#/components/schemas/NoiseReductionEnum"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptureAnalysis"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/camera/capture/{id}/solve:
    post:
      tags:
        - Camera
      summary: Platesolve capture
      description: This endpoint platesolves the capture with the specified id. The result of the platesolve is cached for future calls.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: guid
            example: b8ff14c8-6ccd-4433-b093-d14b844a41c6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatesolveConfig"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatesolveResult"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

