    SequenceEntity:
      type: object
      description: This schema only contains the minimal set of properties which are always included. Depending on the type of entity, additional properties may be included
      properties:
        Name:
          type: string
          description: The name of the sequenc entity
        Conditions:
          type: array
          items:
            $ref: "#/components/schemas/SequenceEntity"
        IsExpanded:
          type: boolean
          description: Whether the item is expanded or not
        Items:
          type: array
          items:
            $ref: "#/components/schemas/SequenceEntity"
        Triggers:
          type: array
          items:
            $ref: "#/components/schemas/SequenceEntity"
        ErrorBehavior:
          type: string
          description: The error behavior of the item
          enum:
            - ContinueOnError
            - SkipInstructionSetOnError
            - AbortOnError
            - SkipToSequenceEndInstructions
        Attempts:
          type: integer
          description: The number of attempts for the item
        Status:
          $ref: "#/components/schemas/SequenceEntityStatus"
        IsContainer:
          type: boolean
          description: Whether the item is a container or not
      required:
        - Name
        - Conditions
        - IsExpanded
        - Items
        - Triggers
        - ErrorBehavior
        - Attempts
        - Status
        - IsContainer

    SequenceTarget:
      type: object
      properties:
        TargetName:
          type: string
        PositionAngle:
          type: number
          minimum: 0
          maximum: 360
        Coordinates:
          $ref: "#/components/schemas/NINACoordinates"
        Status:
          $ref: "#/components/schemas/SequenceEntityStatus"

    SequenceEntityStatus:
      type: string
      enum:
        - CREATED
        - RUNNING
        - FINISHED
        - FAILED
        - SKIPPED
        - DISABLED

    TargetUpdate:
      type: object
      properties:
        TargetName:
          type: string
        Coordinates:
          $ref: "#/components/schemas/HttpCoordinates"
        PositionAngle:
          type: number
          minimum: 0
          maximum: 360

    DeviceList:
      type: array
      items:
        type: object
        properties:
          HasSetupDialog:
            type: boolean
          Id:
            type: string
          Name:
            type: string
          DisplayName:
            type: string
          Category:
            type: string
          Connected:
            type: boolean
          Description:
            type: string
          DriverInfo:
            type: string
          DriverVersion:
            type: string
          SupportedActions:
            type: array
            items: {}
        required:
          - Id
          - Name
          - DisplayName
          - Category
          - Connected
          - Description
          - DriverInfo
          - DriverVersion
          - SupportedActions
          - HasSetupDialog

    CaptureConfig:
      type: object
      properties:
        Duration:
          type: number
          minimum: 0
          description: The duration over which the camera should expose. If not specified, the default platesolving exposure duration as set in NINA will be used
        Gain:
          type: integer
          minimum: 0
          description: The gain to use. If not specified, the camera's default gain will be used
        ROI:
          type: number
          minimum: 0
          maximum: 1
          description: The region of interest to use. If not specified, the an ROI of 1 will be used
        Binning:
          $ref: "#/components/schemas/BinningMode"
          description: The binning mode to use. If not specified, the camera's current binning mode will be used
        ImageType:
          type: string
          description: The image type of the capture. If not specified it is regarded as a snapshot
          enum:
            - LIGHT
            - FLAT
            - BIAS
            - DARK
            - SNAPSHOT
        TargetName:
          type: string
          description: Can be used to associate a capture with a specific target. If not specified, it will have the value of "Snapshot"

    CaptureAnalysis:
      type: object
      properties:
        Stars:
          type: number
          description: The number of stars detected in the image
        HFR:
          type: number
          description: The HFR of the image
        Median:
          type: number
          description: The median of the image
        MedianAbsoluteDeviation:
          type: number
          description: The median absolute deviation of the image
        Mean:
          type: number
          description: The mean of the image
        Max:
          type: number
          description: The maximum value of the image
        Min:
          type: number
          description: The minimum value of the image
        StDev:
          type: number
          description: The standard deviation of the image
        RMS:
          type: number
          description: The root mean square of the image
        PixelSize:
          type: number
          description: The pixel size of the camera that took the image
        BitDepth:
          type: integer
          description: The bit depth of the image
        Width:
          type: integer
          description: The width of the image
        Height:
          type: integer
          description: The height of the image

    DomeFollowBody:
      type: object
      properties:
        ShouldFollow:
          type: boolean
          description: Whether the dome should follow the scope

    DomeSyncBody:
      type: object
      properties:
        Coordinates:
          $ref: "#/components/schemas/HttpCoordinates"
          description: The coordinates to sync to
        SideOfPier:
          type: string
          enum:
            - PierEast
            - PierWest
          description: The side of the pier to sync to

    DomeSlewBody:
      type: object
      properties:
        Azimuth:
          description: Azimuth in degrees
          type: number
          minimum: 0
          maximum: 360
          format: double

    PlatesolveConfig:
      type: object
      properties:
        Attempts:
          type: integer
          minimum: 1
          description: The number of attempts to solve the plate. 1 is the default
        Binning:
          type: integer
          minimum: 1
          description: The binning of the plate. The default is the binning set in the platesolve profile settings
        BlindFailoverEnabled:
          type: boolean
          description: Whether to use the blind solver as a failover if the capture solver fails. The default is read from the profile settings
        Coordinates:
          $ref: "#/components/schemas/HttpCoordinates"
          description: The coordinates to solve for. If not specified, the current mount position will be used
        DownSampleFactor:
          type: integer
          minimum: 1
          description: The down sample factor to use. The default is the down sample factor set in the platesolve profile settings
        FocalLength:
          type: number
          minimum: 0
          description: The focal length to use. The default is the focal length set in the telescope profile settings
        MaxObjects:
          type: integer
          minimum: 1
          description: The maximum number of objects to detect. The default is the max objects set in the platesolve profile settings
        Regions:
          type: integer
          minimum: 1
          description: The number of regions to use. The default is the number of regions set in the platesolve profile settings
        SearchRadius:
          type: number
          minimum: 0
          description: The search radius to use. The default is the search radius set in the platesolve profile settings
        RawConverter:
          type: string
          enum:
            - DCRAW
            - FREEIMAGE
          description: The raw converter to use. The default is the raw converter set in the camera profile settings

    HttpCoordinates:
      type: object
      properties:
        RA:
          type: number
          minimum: -180
          maximum: 180
          description: The right ascension of the coordinates
        Dec:
          type: number
          minimum: -90
          maximum: 90
          description: The declination of the coordinates
        Epoch:
          type: string
          enum:
            - J2000
            - B1950
            - J2050
          description: The epoch of the coordinates. The default is J2000
      required:
        - RA
        - Dec

    BinningMode:
      type: object
      properties:
        X:
          type: integer
          minimum: 1
          example: 2
        Y:
          type: integer
          minimum: 1
          example: 2
      required:
        - X
        - Y

    DewHeaterUpdateBody:
      type: object
      properties:
        Power:
          type: boolean
          example: true
          description: Whether to turn the dew heater on or off.
      required:
        - Power

    USBLimitUpdateBody:
      type: object
      properties:
        Limit:
          type: integer
          description: The desired USB limit. The value must be between the USB limit min and USB limit max
      required:
        - Limit

    ReadoutModeUpdateBody:
      type: object
      properties:
        Mode:
          type: integer
          minimum: 0
          description: The readout mode to set. This is the index of the readout mode in the list of readout modes
      required:
        - Mode

    CoolCameraBody:
      type: object
      properties:
        Temperature:
          type: number
        Duration:
          type: number
          minimum: 0
          description: The duration over which the camera should cool down. If not specified, the default duration as set in NINA will be used
      required:
        - Temperature

    WarmCameraBody:
      type: object
      properties:
        Duration:
          type: number
          minimum: 0
          description: The duration over which the camera should warm up. If not specified, the default duration as set in NINA will be used
      required:
        - Duration

    ApplicationStatus:
      type: object
      properties:
        Source:
          type: string
        Status:
          type: string
        Progress:
          type: number
        MaxProgress:
          type: integer
        ProgressType:
          type: string
          enum:
            - Percent
            - ValueOfMaxValue
        Status2:
          type: string
        Progress2:
          type: number
        MaxProgress2:
          type: integer
        ProgressType2:
          type: string
          enum:
            - Percent
            - ValueOfMaxValue
        Status3:
          type: string
        Progress3:
          type: number
        MaxProgress3:
          type: integer
        ProgressType3:
          type: string
          enum:
            - Percent
            - ValueOfMaxValue

    WorkflowStep:
      type: object
      properties:
        Id:
          type: string
          description: A unique identifier for the step
        Title:
          type: string
          description: The title of the step
        Finished:
          type: boolean
          description: Whether the step has finished

    Error:
      type: object
      properties:
        Error:
          type: string
          enum:
            - Bad Request
            - Unauthorized
            - Forbidden
            - Not Found
            - Method Not Allowed
            - Not Acceptable
            - Request Timeout
            - Conflict
            - Unprocessable Entity
            - Locked
            - Too Many Requests
            - Internal Server Error
            - Not Implemented
            - Bad Gateway
            - Service Unavailable
            - Gateway Timeout
            - Insufficient Storage
            - Unknown Error
        Message:
          type: string
      required:
        - Error

    ProcessStart409:
      type: object
      properties:
        Error:
          type: string
          example: Conflict
        Message:
          type: string
          example: Process could not be started because other processes conflict with it
        Conflicts:
          type: array
          items:
            type: object
            properties:
              ProcessId:
                type: string
                format: guid
                description: The id of the conflicting process
              Status:
                type: string
                enum: [Running, Finished, Pending]
                example: Running
              ProcessType:
                type: string
                example: CameraCool
                description: The type of the conflicting process
            required:
              - ProcessId
              - Status
              - ProcessType
      required:
        - Error
        - Message
        - Conflicts

    ProcessStart200:
      type: object
      properties:
        ProcessId:
          type: string
          format: guid
          description: The id that was assigned to the process
        Status:
          type: string
          example: Running
      required:
        - ProcessId
        - Status

    StringResponse:
      type: object
      properties:
        Message:
          type: string
      required:
        - Message
