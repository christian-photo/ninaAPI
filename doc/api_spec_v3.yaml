          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/dome/set-follow:
