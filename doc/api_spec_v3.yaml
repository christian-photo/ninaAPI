components:
  parameters:
    ImageType:
      name: imageType
      in: query
      description: Use for filtering the image history by image type
      required: false
      schema:
        $ref: "#/components/schemas/ImageTypeEnum"
    ImageFormat:
      name: format
      in: query
      description: Image format
      required: false
      schema:
        type: string
        enum:
          - JPEG
          - PNG
          - AVIF
          - JXL
        default: JPEG
    ImageQuality:
      name: quality
      in: query
      description: Image quality
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 100
        default: 80
    ImageScale:
      name: scale
      in: query
      description: Image scale. Scales both axes by the same amount maintaining aspect ratio and not distorting the image
      required: false
      schema:
        type: number
        minimum: 0
        maximum: 100
        default: 100
    ImageWidth:
      name: width
      in: query
      description:
        Image width. If both width and height are specified, the image will be scaled to fit the specified size **not** preserving aspect ratio.
        If only one of width or height is specified, the other will be calculated to preserve aspect ratio.
      required: false
      schema:
        type: integer
        minimum: 0
    ImageHeight:
      name: height
      in: query
      description:
        Image height. If both width and height are specified, the image will be scaled to fit the specified size **not** preserving aspect ratio.
        If only one of width or height is specified, the other will be calculated to preserve aspect ratio.
      required: false
      schema:
        type: integer
        minimum: 0
    ImageStretchEnabled:
      in: query
      name: stretch
      description: Whether to stretch the image
      required: false
      schema:
        type: boolean
        default: true
    ImageStretchFactor:
      in: query
      name: stretch-factor
      description: The stretch factor to be used. If not specified, the auto stretch factor from the profile will be used
      required: false
      schema:
        type: number
        minimum: 0
    ImageDebayerEnabled:
      in: query
      name: debayer
      description: Whether to debayer the image
      required: false
      schema:
        type: boolean
        default: false
    ImageUnlinkedStretchEnabled:
      in: query
      name: unlinked-stretch
      description: Whether to perform an unlinked stretch on the image, requires stretch to be true
      required: false
      schema:
        type: boolean
        default: false
    ImageBlackClipping:
      in: query
      name: black-clipping
      description: The black clipping value to be used. If not specified, the black clipping value from the profile will be used
      required: false
      schema:
        type: number
    RawConverter:
      in: query
      name: raw-converter
      description: The raw converter to be used. If not specified, the raw converter from the profile will be used
      required: false
      schema:
        $ref: "#/components/schemas/RawConverterEnum"
    BayerPattern:
      in: query
      name: bayer-pattern
      description: The bayer pattern to be used. If not specified, first the auto bayer pattern from the profile will be used (if not set to auto), then the sensor type will be used. By default monochrome
      required: false
      schema:
        $ref: "#/components/schemas/BayerPatternEnum"
    ProcessIdPath:
      name: id
      in: path
      description: Process ID
      required: true
      schema:
        type: string
        format: guid
        example:

    PagerPage:
      in: query
      name: page
      description: Page number, starts at 0
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    PagerPageSize:
      in: query
      name: page-size
      description: Page size. If set to -1, the whole list is returned
      required: false
      schema:
        type: integer
        default: 20
  schemas:
    RawConverterEnum:
      type: string
      enum:
        - DCRAW
        - FREEIMAGE

    BayerPatternEnum:
      type: string
      default: Monochrome
      enum:
        - Monochrome
        - Color
        - RGGB
        - CYMG
        - CMYG2
        - LRGB
        - BGGR
        - GBRG
        - GRBG
        - GBGR
        - RGBG
        - BGRG

    CameraInfo:
      type: object
      properties:
        Response:
          type: object
          properties:
            CanSetTemperature:
              type: boolean
            HasShutter:
              type: boolean
            Temperature:
              type: number
            Gain:
              type: integer
            DefaultGain:
              type: integer
            ElectronsPerADU:
              type: number
            BinX:
              type: integer
            BitDepth:
              type: integer
            BinY:
              type: integer
            CanSetOffset:
              type: boolean
            CanGetGain:
              type: boolean
            OffsetMin:
              type: integer
            OffsetMax:
              type: integer
            Offset:
              type: integer
            DefaultOffset:
              type: integer
            USBLimit:
              type: integer
            IsSubSampleEnabled:
              type: boolean
            CameraState:
              type: string
              enum:
                - NoState
                - Idle
                - Waiting
                - Exposing
                - Reading
                - Download
                - Error
                - LoadingFile
            XSize:
              type: integer
            YSize:
              type: integer
            HasBattery:
              type: boolean
            PixelSize:
              type: number
              description: Pixel size in microns
            Battery:
              type: integer
            GainMin:
              type: integer
            GainMax:
              type: integer
            CanSetGain:
              type: boolean
            Gains:
              type: array
              items:
                type: integer
            CoolerOn:
              type: boolean
            CoolerPower:
              type: number
            HasDewHeater:
              type: boolean
            DewHeaterOn:
              type: boolean
            CanSubSample:
              type: boolean
            SubSampleX:
              type: integer
            SubSampleY:
              type: integer
            SubSampleWidth:
              type: integer
            SubSampleHeight:
              type: integer
            TemperatureSetPoint:
              type: number
            ReadoutModes:
              type: array
              items:
                type: string
            ReadoutMode:
              type: integer
            ReadoutModeForSnapImages:
              type: integer
            ReadoutModeForNormalImages:
              type: integer
            IsExposing:
              type: boolean
            ExposureEndTime:
              type: string
              format: datetime
            LastDownloadTime:
              type: number
            SensorType:
              type: string
              enum:
                - Monochrome
                - Color
                - RGGB
                - CMYG
                - CMYG2
                - LRGB
                - BGGR
                - GBRG
                - GRBG
                - GRGB
                - GBGR
                - RGBG
                - BGRG
            BayerOffsetX:
              type: integer
            BayerOffsetY:
              type: integer
            BinningModes:
              type: array
              items:
                type: object
                properties:
                  Name:
                    type: string
                  X:
                    type: integer
                  "Y":
                    type: integer
                required:
                  - Name
                  - X
                  - "Y"
            ExposureMax:
              type: number
            ExposureMin:
              type: number
            LiveViewEnabled:
              type: boolean
            CanShowLiveView:
              type: boolean
            SupportedActions:
              type: array
              items:
                type: string
            CanSetUSBLimit:
              type: boolean
            USBLimitMin:
              type: integer
            USBLimitMax:
              type: integer
            Connected:
              type: boolean
            Name:
              type: string
            DisplayName:
              type: string
            DeviceId:
              type: string
          required:
            - CanSetTemperature
            - HasShutter
            - Temperature
            - Gain
            - DefaultGain
            - ElectronsPerADU
            - BinX
            - BitDepth
            - BinY
            - CanSetOffset
            - CanGetGain
            - OffsetMin
            - OffsetMax
            - Offset
            - DefaultOffset
            - USBLimit
            - IsSubSampleEnabled
            - CameraState
            - XSize
            - YSize
            - PixelSize
            - HasBattery
            - Battery
            - GainMin
            - GainMax
            - CanSetGain
            - Gains
            - CoolerOn
            - CoolerPower
            - HasDewHeater
            - DewHeaterOn
            - CanSubSample
            - SubSampleX
            - SubSampleY
            - SubSampleWidth
            - SubSampleHeight
            - TemperatureSetPoint
            - ReadoutMode
            - ReadoutModeForSnapImages
            - ReadoutModeForNormalImages
            - IsExposing
            - ExposureEndTime
            - LastDownloadTime
            - SensorType
            - BayerOffsetX
            - BayerOffsetY
            - BinningModes
            - ExposureMax
            - ExposureMin
            - LiveViewEnabled
            - CanShowLiveView
            - CanSetUSBLimit
            - USBLimitMin
            - USBLimitMax
            - Connected

    PlatesolveResult:
      type: object
      properties:
        SolveTime:
          type: string
          format: date-time
          example: "2025-05-04T14:57:39.5079"
        Orientation:
          type: number
          description: Deprecated, use PositionAngle instead
          deprecated: true
        PositionAngle:
          type: number
          format: double
          description: The position angle of the frame in degrees
        Pixscale:
          type: number
          format: double
          description: The pixel scale of the frame in arcseconds
        Radius:
          type: number
          format: double
          description: The radius of the frame in arcseconds
        Coordinates:
          $ref: "#/components/schemas/NINACoordinates"
        Flipped:
          type: boolean
          description: Indicates if the frame is flipped
        Success:
          type: boolean
          description: Indicates if the plate solve was successful
        RaErrorString:
          type: string
          description: The RA error in a HMS format
        RaPixError:
          type: number
          format: double
          description: The RA error in pixels
        DecPixError:
          type: number
          format: double
          description: The Dec error in pixels
        DecErrorString:
          type: string
          description: The Dec error in a DMS format
      required:
        - SolveTime
        - Orientation
        - PositionAngle
        - Pixscale
        - Radius
        - Coordinates
        - Flipped
        - Success
        - RaErrorString
        - RaPixError
        - DecPixError
        - DecErrorString

    DomeInfo:
      type: object
      properties:
        ShutterStatus:
          type: string
          description: Indicates the current state of the dome shutter
          enum:
            - ShutterNone
            - ShutterOpen
            - ShutterClosed
            - ShutterOpening
            - ShutterClosing
            - ShutterError
        DriverCanFollow:
          type: boolean
        CanSetShutter:
          type: boolean
        CanSetPark:
          type: boolean
        CanSetAzimuth:
          type: boolean
        CanSyncAzimuth:
          type: boolean
        CanPark:
          type: boolean
        CanFindHome:
          type: boolean
        AtPark:
          type: boolean
        AtHome:
          type: boolean
        DriverFollowing:
          type: boolean
        ApplicationFollowing:
          type: boolean
        Slewing:
          type: boolean
        FollowingType:
          type: string
          description: Indicates the type of dome following
        Azimuth:
          type: number
          format: double
        Altitude:
          type: number
          format: double
        AzimuthDMS:
          type: string
          description: The azimuth in a degree - minute - seconds format
        AltitudeDMS:
          type: string
          description: The altitude in a degree - minute - seconds format
        SupportedActions:
          type: array
          items:
            type: string
        Connected:
          type: boolean
        Name:
          type: string
        DisplayName:
          type: string
        Description:
          type: string
        DriverInfo:
          type: string
        DriverVersion:
          type: string
        DeviceId:
          type: string
        IsFollowing:
          type: boolean
        IsSynchronized:
          type: boolean
      required:
        - IsFollowing
        - IsSynchronized
        - FollowingType
        - AzimuthDMS
        - AltitudeDMS
        - ShutterStatus
        - DriverCanFollow
        - CanSetShutter
        - CanSetPark
        - CanSetAzimuth
        - CanSyncAzimuth
        - CanPark
        - CanFindHome
        - AtPark
        - AtHome
        - DriverFollowing
        - ApplicationFollowing
        - Slewing
        - Azimuth
        - Altitude
        - SupportedActions
        - Connected

    FWInfo:
      type: object
      properties:
        Response:
          type: object
          properties:
            Connected:
              type: boolean
            Name:
              type: string
            DisplayName:
              type: string
            Description:
              type: string
            DriverInfo:
              type: string
            DriverVersion:
              type: string
            DeviceId:
              type: string
            IsMoving:
              type: boolean
            SupportedActions:
              type: array
              items:
                type: string
