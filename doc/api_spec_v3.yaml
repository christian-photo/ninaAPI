          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/camera/settings/dew-heater:
    put:
      tags:
        - Camera
      summary: Dew Heater Control
      description: Use this endpoint to toggle the dew heater on and off.
      requestBody:
        required: true
