  /equipment/camera/abort-exposure:
    post:
      tags:
        - Camera
      summary: Exposure Abort
      description: This endpoint aborts the current exposure.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
