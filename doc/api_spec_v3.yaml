  /equipment/camera/cool:
    post:
      tags:
        - Camera
      summary: Cooling
      description: Cool the camera to a given temperature over a set peroid of time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoolCameraBody"
      responses:
        "200":
          description: Cooling started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessStart200"
        "409":
          description: Process conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProcessStart409"
                  - $ref: "#/components/schemas/Error"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/camera/warm:
    post:
      tags:
        - Camera
      summary: Warming
      description: Warms the camera over a minimum duration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarmCameraBody"
      responses:
        "200":
          description: Warming started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessStart200"
        "409":
          description: Process conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProcessStart409"
                  - $ref: "#/components/schemas/Error"
        default:
          description: Request could not be carried out
