      tags:
        - Dome
      summary: Set Dome follow
      description: Start or stop the dome to follow the telescope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomeFollowBody"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
