                  - $ref: "#/components/schemas/Error"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/dome/shutter/close:
    post:
      tags:
        - Dome
      summary: Close Shutter
      description: Close Dome Shutter. This will verify that the dome is connected and the shutter is not already closed or closing.
      responses:
