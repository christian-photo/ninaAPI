          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/dome/sync:
    post:
      tags:
        - Dome
      summary: Sync Dome To Telescope
      description: Sync dome to provided coordinates or the telescope coordinates if none are provided. Checks if the dome is connected, not slewing and (if no coordinates are provided) if the telescope is connected
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomeSyncBody"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /equipment/dome/slew:
    post:
      tags:
        - Dome
      summary: Slew
      description: Slew dome to specified azimuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomeSlewBody"
      responses:
        "200":
          description: Success
