openapi: 3.1.0
info:
  title: Advanced API
  description: This is the API documentation for the NINA plugin Advanced API.
  version: 3.0.0.0
servers:
  - url: http://localhost:1888/v3/api
    description: V3 api server
paths:
  /version:
    get:
      tags:
        - Application
      summary: Plugin Version
      description: Returns the installed plugin version.
      responses:
        "200":
          description: Version
          content:
            application/json:
              schema:
                type: object
                properties:
                  Version:
                    type: string
                    example: 3.0.0.0
                required:
                  - Version

  /version/nina:
    get:
      tags:
        - Application
      summary: NINA Version
      description: Returns the version of NINA.
      parameters:
        - in: query
          name: friendly
          required: false
          description: If true, the version will be returned in a friendly format.
          schema:
            type: boolean
      responses:
        "200":
          description: Version
          content:
            application/json:
              schema:
                type: object
                properties:
                  Version:
                    type: string
                    examples:
                      - non-friendly:
                          value: 3.2.0.1058
                          summary: Non-friendly version
                      - friendly:
                          value: 3.2 NIGHTLY #058
                          summary: Friendly version
                required:
                  - Version

  /time/application-start:
    get:
      tags:
        - Application
      summary: NINA start time
      description: Returns the time NINA was started.
      responses:
        "200":
          description: Application start time
          content:
            application/json:
              schema:
                type: object
                properties:
                  Time:
                    type: string
                    example: 2025-07-20T09:43:44.351798+02:00
                required:
                  - Time

  /time:
    get:
      tags:
        - Application
      summary: Current time
      description: Returns the current local time.
      responses:
        "200":
          description: Local time
          content:
            application/json:
              schema:
                type: object
                properties:
                  Time:
                    type: string
                    example: 2025-07-20T09:43:44.351798+02:00
                required:
                  - Time

  /process/{id}/status:
    get:
      tags:
        - Process
      summary: Process status
      description: Returns the status of a process. By default this will return the status of the process, but some processes have additional information that can be returned. For example, the status of a camera process will return the current state of the camera.
      parameters:
        - in: path
          name: id
          required: true
          description: The Id of the process.
          schema:
            type: string
            format: guid
      responses:
        "200":
          description: Process status
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      Status:
                        type: string
                        enum:
                          - Pending
                          - Running
                          - Finished
                    required:
                      - Status
                  - $ref: "#/components/schemas/AutoFocusProcessProgress"
                  - $ref: "#/components/schemas/MeridianFlipProcessProgress"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /process/{id}/abort:
    post:
      tags:
        - Process
      summary: Process Abort
      description: Aborts a process. This is guaranteed to leave the process (if it was found) in the finished state. Returns the status of the process.
      parameters:
        - in: path
          name: id
          required: true
          description: The Id of the process.
          schema:
            type: string
            format: guid
      responses:
        "200":
          description: Process aborted, returns the status of the process
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      Status:
                        type: string
                        example: Finished
                    required:
                      - Status
        "400":
          description: Invalid process ID format
          content:
            application/json:
              schema:
                type: object
                properties:
                  Error:
                    type: string
                    example: Bad Request
                  Message:
                    type: string
                    example: ID could not be parsed
                required:
                  - Error
                  - Message
        "404":
          description: Process not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  Error:
                    type: string
                    example: Not Found
                  Message:
                    type: string
                    example: Process not found
                required:
                  - Error
                  - Message

  /process/{id}/wait:
    get:
      tags:
        - Process
      summary: Await Process Completion
      description: This endpoint does not return until the process has finished. Make sure your timeout is set appropriately.
      parameters:
        - in: path
          name: id
          required: true
          description: The Id of the process.
          schema:
            type: string
            format: guid
      responses:
        "200":
          description: Process aborted, returns the status of the process
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      Status:
                        type: string
                        example: Finished
                    required:
                      - Status
        "400":
          description: Invalid process ID format
          content:
            application/json:
              schema:
                type: object
                properties:
                  Error:
                    type: string
                    example: Bad Request
                  Message:
                    type: string
                    example: ID could not be parsed
                required:
                  - Error
                  - Message
        "404":
          description: Process not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  Error:
                    type: string
                    example: Not Found
                  Message:
                    type: string
                    example: Process not found
                required:
                  - Error
                  - Message

  /equipment/camera:
    get:
      tags:
        - Camera
      summary: Information
      description: This endpoint returns information about the camera.
      responses:
