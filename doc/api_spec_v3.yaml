            - IsMoving

    CustomFilterDataFull:
      type: object
      properties:
        Name:
          type: string
          description: Name of the filter
        FocusOffset:
          type: integer
          description: Focus offset in steps
        Position:
          type: integer
          description: Position of the filter in the filterwheel
        AutoFocusExposureTime:
          type: integer
          description: Exposure time for autofocus
