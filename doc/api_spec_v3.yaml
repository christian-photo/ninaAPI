                $ref: "#/components/schemas/Error"

  /sequence:
    get:
      tags:
        - Sequence
      summary: Get Sequence
      description:
        Get current sequence as json. If the query parameter `base` is set to true,
        the sequence will be returned in the format you get when saving the sequence to the disk. This can be used to edit the sequence and update it again afterwards.
        The response for the base version will look slightly different from the normal version.
      parameters:
        - in: query
          name: base
          description: Return the sequence in the format it is saved to the disk
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SequenceEntity"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Sequence
      summary: Load Sequence
      description: Load a sequence from a local file or from the request body.
      parameters:
        - in: query
          name: name
          description: The name of the sequence to load. A list of available sequences can be found by calling the `/sequence/available` endpoint.
          required: false
          schema:
            type: string
            example: "My Sequence"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SequenceEntity"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags:
        - Sequence
      summary: Edit a Sequence
      description:
        This works similary to profile/settings (PATCH). Note that this mainly supports fields that expect simple types like strings, numbers etc,
        and may not work for things like enums or objects (filter, time source, ...). This is an experimental feature, and it could have unexpected side effects or simply not work for some instructions or fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeValueConfig"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sequence/start:
    post:
      tags:
        - Sequence
      summary: Start
      description: Start Advanced Sequence.
      parameters:
        - in: query
          name: validate
          description: If the sequence should be validated before starting. In general you want this to be false if you are starting the sequence from the API
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sequence/stop:
    post:
      tags:
        - Sequence
      summary: Stop
      description: Stop Advanced Sequence.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sequence/reset:
    post:
      tags:
        - Sequence
      summary: Reset Sequence
      description: Reset Advanced Sequence. This will stop the sequence and reset all targets and items.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sequence/skip:
    post:
      tags:
        - Sequence
      summary: Skip
      description: Skip in the sequence
      parameters:
        - in: query
          name: type
          description: The type of skip to perform
          required: true
          schema:
            type: string
            enum:
              - SkipCurrentItems
              - SkipToImaging
              - SkipToEnd
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResponse"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sequence/available:
    get:
      tags:
        - Sequence
      summary: Available Sequences
      description: List available sequences.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  description: The name of the sequence
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sequence/running-items:
    get:
      tags:
        - Sequence
      summary: Get Running Items
      description: Get the running items of the sequence
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SequenceEntity"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sequence/target:
    get:
      tags:
        - Sequence
      summary: Get Targets
      description: Get all targets in the sequence
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SequenceTarget"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags:
        - Sequence
      summary: Update Target
      description: Update the properties of any one of the active target containers in the sequence
      parameters:
        - name: target
          in: query
          description: The index of the target which to update
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TargetUpdate"

  /event-history:
    get:
      tags:
        - Event Websocket
      summary: Event History
      description: Get event history
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  Response:
                    type: array
                    items:
                      type: object
                      properties:
                        Event:
                          type: string
                        Time:
                          type: string
                  Error:
                    type: string
                    example: ""
                  StatusCode:
                    type: integer
                    example: 200
                  Success:
                    type: boolean
                    example: true
                  Type:
                    type: string
                    example: "API"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /livestack/start:
    get:
      tags:
        - Livestack
      summary: Start Livestack
      description: Starts Livestack, requires Livestack >= v1.0.0.9. Note that this method cannot fail, even if the livestack plugin is not installed or something went wrong. This simply issues a command to start the livestack.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  Response:
                    type: string
                    example: Live stack started
                  Error:
                    type: string
                    example: ""
                  StatusCode:
                    type: integer
                    example: 200
                  Success:
                    type: boolean
                    example: true
                  Type:
                    type: string
                    example: "API"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /livestack/stop:
    get:
      tags:
        - Livestack
      summary: Stop Livestack
      description: Stops Livestack, requires Livestack >= v1.0.0.9. Note that this method cannot fail, even if the livestack plugin is not installed or something went wrong. This simply issues a command to stop the livestack.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  Response:
                    type: string
                    example: Live stack stopped
                  Error:
                    type: string
                    example: ""
                  StatusCode:
                    type: integer
                    example: 200
                  Success:
                    type: boolean
                    example: true
                  Type:
                    type: string
                    example: "API"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /livestack/image/available:
    get:
      tags:
        - Livestack
      summary: Available Stacks
      description: Livestack >= v1.0.0.9. Returns a list of available stacks, which can be retrieved
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  Response:
                    type: array
                    items:
                      type: object
                      properties:
                        Filter:
                          type: string
                          example: RGB
                        Target:
                          type: string
                          example: M31
                  Error:
                    type: string
                    example: ""
                  StatusCode:
                    type: integer
                    example: 200
                  Success:
                    type: boolean
                    example: true
                  Type:
                    type: string
                    example: "API"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /livestack/image/{target}/{filter}:
    get:
      tags:
        - Livestack
      summary: Get Stacked Image
      description: Gets the stacked image from the livestack plugin for a given target and filter.
      parameters:
        - in: path
          name: target
          required: true
          schema:
            type: string
            example: M31
        - in: path
          name: filter
          required: true
          schema:
            type: string
            example: RGB
        - in: query
          name: resize
          description: Whether to resize the image.
          required: false
          schema:
            type: boolean
        - in: query
          name: quality
          description: The quality of the image, ranging from 1 (worst) to 100 (best). -1 or omitted for png
          required: false
          schema:
            type: integer
            format: int32
        - in: query
          name: size
          description: The size of the image ([width]x[height]). Requires resize to be true.
          required: false
          schema:
            type: string
        - in: query
          name: scale
          description: The scale of the image. Requires resize to be true.
          required: false
          schema:
            type: number
            format: double
        - in: query
          name: stream
          description: Stream the image to the client. This will stream the image in image/jpg or image/png format.
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  Response:
                    type: string
                    example: "<base64 encoded image>"
                  Error:
                    type: string
                    example: ""
                  StatusCode:
                    type: integer
                    example: 200
                  Success:
                    type: boolean
                    example: true
                  Type:
                    type: string
                    example: "API"
            image/png:
              schema:
                description: Image in png format, when stream is set to true and the image quality is not specified or set to -1
                type: array
                format: binary
            image/jpg:
              schema:
                description: Image in jpg format, when stream is set to true and the image quality is specified
                type: array
                format: binary
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /flats/skyflat:
    get:
      tags:
        - Flats
      summary: Sky flats
      description: Start capturing sky flats. This requires the camera and mount to be connected. Any omitted parameter will default to the instruction default.
      parameters:
        - in: query
          name: count
          required: true
          description: The number of flats to capture
          example: 1
          schema:
            type: integer
            minimum: 0
        - in: query
          name: minExposure
          required: false
          description: The minimum exposure time to use for the flats, in seconds
          example: 0
          schema:
            type: number
            minimum: 0
        - in: query
          name: maxExposure
          required: false
          description: The maximum exposure time to use for the flats, in seconds
          example: 10
          schema:
            type: number
            minimum: 0
        - in: query
          name: histogramMean
          required: false
          description: The mean to use for the histogram
          example: 50
          schema:
            type: number
            minimum: 0
            maximum: 1
        - in: query
          name: meanTolerance
          required: false
          description: The tolerance to use for the histogram
          example: 10
          schema:
            type: number
            minimum: 0
            maximum: 1
        - in: query
          name: dither
          required: false
          description: Whether to dither the flats
          example: false
          schema:
            type: boolean
        - in: query
          name: filterId
          required: false
          description: The filter to use for the flats. The current filter will be used if this is not specified
          schema:
            type: integer
            minimum: 0
        - in: query
          name: binning
          required: false
          description: The binning to use for the flats
          example: 2x2
          schema:
            type: string
        - in: query
          name: gain
          required: false
          description: The gain to use for the flats. The camera gain will be used if this is not specified
          schema:
            type: integer
            minimum: 0
        - in: query
          name: offset
          required: false
          description: The offset to use for the flats. The camera offset will be used if this is not specified
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  Response:
                    type: string
                    example: Process started
                  Error:
                    type: string
                    example: ""
                  StatusCode:
                    type: integer
                    example: 200
                  Success:
                    type: boolean
                    example: true
                  Type:
                    type: string
                    example: "API"
        "400":
          description: Could not start the process
          content:
            application/json:
              schema:
                type: object
                properties:
                  Response:
                    oneOf:
                      - type: string
                        example: ""
                      - type: array
                        items:
                          type: string
                          description: A list of issues found during validation
                  Error:
                    type: string
                    enum:
                      - Process already running
                      - Filter not available
                      - Binning not available
                      - Invalid gain
                      - Invalid offset
                      - Issues found
                  StatusCode:
                    type: integer
                    example: 400
                  Success:
                    type: boolean
                    example: false
                  Type:
                    type: string
                    example: "API"
        default:
          description: Request could not be carried out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /flats/auto-brightness:
    get:
      tags:
        - Flats
      summary: Auto Brightness Flats
      description: Start capturing auto brightness flats. This requires the camera to be connected. NINA will pick the best flat panel brightness for a fixed exposure time. Any omitted parameter will default to the instruction default.
      parameters:
        - in: query
          name: count
          required: true
          description: The number of flats to capture
          example: 1
          schema:
            type: integer
            minimum: 0
        - in: query
          name: exposureTime
          required: true
          description: The exposure time to use for the flats, in seconds
          example: 1
          schema:
            type: number
            minimum: 0
        - in: query
          name: minBrightness
          required: false
          description: The minimum flat panel brightness to use for the flats
          example: 0
          schema:
            type: integer
            minimum: 0
            maximum: 99
        - in: query
          name: maxBrightness
          required: false
          description: The maximum flat panel brightness to use for the flats
          example: 10
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: histogramMean
          required: false
          description: The mean to use for the histogram
          example: 50
          schema:
            type: number
            minimum: 0
            maximum: 1
        - in: query
          name: meanTolerance
          required: false
          description: The tolerance to use for the histogram
          example: 10
          schema:
            type: number
            minimum: 0
            maximum: 1
        - in: query
          name: filterId
          required: false
          description: The filter to use for the flats. The current filter will be used if this is not specified
          schema:
            type: integer
            minimum: 0
        - in: query
          name: binning
          required: false
          description: The binning to use for the flats
          example: 2x2
